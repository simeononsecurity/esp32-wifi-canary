[platformio]
src_dir = .

; ── M5Stack Atom Lite (primary target) ──────────────────────────────────────
; Single SK6812 RGB LED on GPIO27. Button on GPIO39.
; USB-to-serial: CP2104 → /dev/tty.usbserial-*
[env:atom-lite]
platform = espressif32@^6.3.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
upload_port = /dev/tty.usbserial-*

lib_deps =
    adafruit/Adafruit NeoPixel@^1.15.1

build_flags =
    -DCORE_DEBUG_LEVEL=0

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv

; ── Generic ESP32 DevKit (for testing without an Atom Lite) ─────────────────
; Uses onboard LED on GPIO2. No NeoPixel — LED only indicates alert/OK
; with on/off behavior (no color). Serial output still fully functional.
[env:esp32dev]
platform = espressif32@^6.3.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DDEVKIT_LED

build_src_filter = +<main.cpp>

board_build.partitions = partitions_4mb.csv
